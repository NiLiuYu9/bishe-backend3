server:
  port: 8080
  servlet:
    context-path: /api

api:
  gateway:
    url: http://localhost:9000
    mock-path: /mock

logging:
  level:
    com.alibaba.druid.pool.DruidAbstractDataSource: ERROR

spring:
  application:
    name: api-platform-backend
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/api_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
  redis:
    host: localhost
    port: 6379
  session:
    store-type: redis
    timeout: 1800
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

dubbo:
  application:
    name: api-platform-backend
  protocol:
    name: dubbo
    port: 20880
  registry:
    address: nacos://localhost:8848
  scan:
    base-packages: com.api.platform.service.dubbo

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.api.platform.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

alipay:
  app-id: 9021000162629658
  private-key: 
  alipay-public-key: 
  server-url: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  notify-url: http://xbb9cfca.natappfree.cc/api/order/pay/notify
  return-url: http://localhost:3000/user/orders
