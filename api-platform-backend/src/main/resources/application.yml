# ==================== 服务器配置 ====================
server:
  port: 8080                          # 服务端口号
  servlet:
    context-path: /api                # 应用上下文路径，所有接口需以 /api 开头

# ==================== 自定义API网关配置 ====================
api:
  gateway:
    url: http://localhost:9000         # 网关服务地址
    mock-path: /mock                  # Mock接口路径前缀（已废弃，Mock接口改为按业务分类）

# ==================== 日志配置 ====================
logging:
  level:
    com.alibaba.druid.pool.DruidAbstractDataSource: ERROR   # 关闭Druid数据源DEBUG日志，仅打印ERROR级别

# ==================== Spring Boot 核心配置 ====================
spring:
  application:
    name: api-platform-backend        # 应用名称，用于Nacos服务注册和Dubbo服务标识
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848   # Nacos注册中心地址，服务注册与发现
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource   # 使用Druid连接池
    driver-class-name: com.mysql.cj.jdbc.Driver    # MySQL JDBC驱动
    url: jdbc:mysql://localhost:3306/api_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai   # 数据库连接地址（api_platform库，UTF-8编码，禁用SSL，上海时区）
    username: root                    # 数据库用户名
    password: 123456                  # 数据库密码
    druid:
      initial-size: 5                 # 连接池初始化连接数
      min-idle: 5                     # 连接池最小空闲连接数
      max-active: 20                  # 连接池最大活跃连接数
      max-wait: 60000                 # 获取连接最大等待时间（毫秒）
      time-between-eviction-runs-millis: 60000    # 空闲连接检测线程运行间隔（毫秒）
      min-evictable-idle-time-millis: 300000      # 连接最小空闲时间，超过此值可能被回收（毫秒）
      validation-query: SELECT 1      # 连接有效性验证SQL
      test-while-idle: true           # 空闲时检测连接是否有效
      test-on-borrow: false           # 获取连接时不检测有效性（提升性能）
      test-on-return: false           # 归还连接时不检测有效性（提升性能）
      pool-prepared-statements: true  # 开启预编译SQL语句缓存（PSCache）
      max-pool-prepared-statement-per-connection-size: 20    # 每个连接PSCache最大缓存数量
  redis:
    host: localhost                   # Redis服务器地址
    port: 6379                        # Redis服务器端口
  session:
    store-type: redis                 # Session存储方式：使用Redis集中存储，支持分布式会话
    timeout: 1800000                     # Session超时时间（秒）
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss  # JSON序列化时日期格式化模板
    time-zone: Asia/Shanghai          # JSON序列化时使用的时区
    serialization:
      write-dates-as-timestamps: false   # 日期不序列化为时间戳，使用上面指定的格式化字符串

# ==================== Dubbo RPC 配置 ====================
dubbo:
  application:
    name: api-platform-backend        # Dubbo服务应用名，与spring.application.name保持一致
  protocol:
    name: dubbo                       # Dubbo通信协议
    port: 20880                       # Dubbo协议端口
  registry:
    address: nacos://localhost:8848   # Dubbo注册中心：使用Nacos作为注册中心
  scan:
    base-packages: com.api.platform.service.dubbo   # Dubbo服务扫描包路径，该包下的@Service会被暴露为Dubbo服务

# ==================== MyBatis-Plus ORM 配置 ====================
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml    # Mapper XML文件路径，用于自定义复杂SQL
  type-aliases-package: com.api.platform.entity   # 实体类别名包，XML中可直接使用类名
  configuration:
    map-underscore-to-camel-case: true             # 自动下划线转驼峰（如user_name → userName）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl   # SQL日志输出到控制台，便于调试
  global-config:
    db-config:
      id-type: auto                                # 主键ID生成策略：数据库自增
      logic-delete-field: deleted                  # 逻辑删除字段名
      logic-delete-value: 1                        # 逻辑已删除值（deleted=1表示已删除）
      logic-not-delete-value: 0                    # 逻辑未删除值（deleted=0表示未删除）

# ==================== 支付宝支付配置（沙箱环境） ====================
alipay:
  app-id: 9021000162629658                        # 支付宝沙箱应用ID
  private-key:    # 支付宝应用私钥（用于请求签名）
  alipay-public-key:    # 支付宝公钥（用于验证支付宝异步通知签名）
  server-url: https://openapi-sandbox.dl.alipaydev.com/gateway.do   # 支付宝沙箱网关地址
  notify-url: http://ja2267d9.natappfree.cc/api/order/pay/notify    # 支付异步通知回调地址（内网穿透）
  return-url: http://localhost:3000/user/orders                      # 支付完成后同步跳转地址（前端订单页）